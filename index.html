<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heaven - 个人主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f6ff;
      --text: #0f172a;
      --text-secondary: #64748b;
      --accent: #3b82f6;
      --border: #cbd5e8;
      --card-bg: rgba(255, 255, 255, 0.7);
      --link-hover: #1d4ed8;
      --glow: rgba(59, 130, 246, 0.15);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1120;
        --text: #e2e8f0;
        --text-secondary: #94a3b8;
        --accent: #60a5fa;
        --border: #1e3a5f;
        --card-bg: rgba(15, 23, 42, 0.6);
        --link-hover: #93bbfd;
        --glow: rgba(96, 165, 250, 0.1);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.7;
      background:
        radial-gradient(ellipse 700px 500px at 15% 5%, rgba(59, 130, 246, 0.12), transparent),
        radial-gradient(ellipse 500px 400px at 85% 20%, rgba(139, 92, 246, 0.1), transparent),
        radial-gradient(ellipse 600px 450px at 50% 90%, rgba(6, 182, 212, 0.1), transparent),
        radial-gradient(ellipse 400px 300px at 75% 60%, rgba(59, 130, 246, 0.08), transparent),
        linear-gradient(160deg, #e8f0fe 0%, #f0f6ff 30%, #f5f0ff 60%, #ecfeff 100%);
      background-attachment: fixed;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background:
          radial-gradient(ellipse 700px 500px at 15% 5%, rgba(59, 130, 246, 0.08), transparent),
          radial-gradient(ellipse 500px 400px at 85% 20%, rgba(139, 92, 246, 0.07), transparent),
          radial-gradient(ellipse 600px 450px at 50% 90%, rgba(6, 182, 212, 0.06), transparent),
          radial-gradient(ellipse 400px 300px at 75% 60%, rgba(59, 130, 246, 0.05), transparent),
          linear-gradient(160deg, #0b1120 0%, #0f1a2e 40%, #121228 70%, #0b1120 100%);
        background-attachment: fixed;
      }
    }

    .container {
      max-width: 560px;
      width: 100%;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #60a5fa, #93c5fd);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif SC', serif;
      font-size: 2rem;
      color: #ffffff;
      font-weight: 600;
      letter-spacing: 2px;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      letter-spacing: 0.5px;
    }

    .tagline {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 300;
      margin-bottom: 1.75rem;
    }

    .bio {
      font-size: 0.925rem;
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
      line-height: 1.8;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 400;
      transition: all 0.2s ease;
      background: var(--card-bg);
      backdrop-filter: blur(8px);
    }

    .links a:hover {
      border-color: var(--accent);
      color: var(--link-hover);
      transform: translateY(-1px);
      box-shadow: 0 2px 12px rgba(59, 130, 246, 0.15);
    }

    .links a svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      opacity: 0.3;
      margin-bottom: 2.5rem;
    }

    .interests {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .interests span {
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--accent);
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: var(--text-secondary);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">H</div>
    <h1>Heaven</h1>
    <p class="tagline">Front-end Developer</p>
    <p class="bio">
      热爱前端技术，专注于构建优雅、高性能的 Web 应用。喜欢探索新技术，乐于分享与交流。
    </p>

    <div class="divider"></div>

    <p class="section-title">链接</p>
    <div class="links">
      <a href="/blog" title="博客">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        博客
      </a>
      <a href="https://github.com/lichenbuliren" target="_blank" rel="noopener" title="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </a>
    </div>

    <p class="section-title">兴趣</p>
    <div class="interests">
      <span>JavaScript</span>
      <span>TypeScript</span>
      <span>React</span>
      <span>Vue</span>
      <span>Node.js</span>
      <span>性能优化</span>
    </div>

    <footer>© 2026 Heaven</footer>
  </div>
</body>
</html>
